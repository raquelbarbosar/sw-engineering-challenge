version: '3.8'

services:
  postgres:
    image: postgres:16.13
    container_name: postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: bloqit-api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pg123
    volumes:
        - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d postgres" ]
      interval: 30s
      timeout: 10s
      retries: 5
